<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Julia Ferreira Studio | Maquiagem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --branco: #fafafa;
      --preto: #1a1a1a;
      --dourado: #c9a962;
      --dourado-claro: #e5d4a1;
      --dourado-escuro: #a68b4a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #ffffff;
      color: var(--preto);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Header */
    .page-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      background: rgba(255, 255, 255, 0.95);
      border-bottom: 1px solid rgba(201, 169, 98, 0.35);
      backdrop-filter: blur(8px);
    }

    .page-header__logo {
      display: block;
      height: 48px;
      width: auto;
    }

    .page-header__logo img {
      height: 100%;
      width: auto;
      display: block;
      object-fit: contain;
    }

    .page-header__nav {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .page-header__nav a {
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--preto);
      text-decoration: none;
      transition: color 0.25s ease, border-color 0.25s ease;
      border-bottom: 2px solid transparent;
      padding-bottom: 2px;
    }

    .page-header__nav a:hover,
    .page-header__nav a:focus {
      color: var(--dourado-escuro);
      border-bottom-color: var(--dourado-escuro);
    }

    @media (min-width: 600px) {
      .page-header {
        padding: 1.25rem 2rem;
      }
      .page-header__logo {
        height: 52px;
      }
      .page-header__nav {
        gap: 2rem;
      }
      .page-header__nav a {
        font-size: 0.95rem;
      }
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem 4rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Carrossel de fundo */
    .hero-carousel {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .hero-carousel__slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      animation: heroCarousel 20s infinite;
    }

    .hero-carousel__slide:nth-child(1) { background-image: url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?w=1920&q=80'); animation-delay: 0s; }
    .hero-carousel__slide:nth-child(2) { background-image: url('https://images.unsplash.com/photo-1596462502278-27bfdc403348?w=1920&q=80'); animation-delay: 4s; }
    .hero-carousel__slide:nth-child(3) { background-image: url('https://images.unsplash.com/photo-1487412947147-5cebf100ffc2?w=1920&q=80'); animation-delay: 8s; }
    .hero-carousel__slide:nth-child(4) { background-image: url('https://images.unsplash.com/photo-1516975080664-ed2fc6a32937?w=1920&q=80'); animation-delay: 12s; }

    @keyframes heroCarousel {
      0% { opacity: 0; }
      5% { opacity: 0.32; }
      20% { opacity: 0.32; }
      25% { opacity: 0; }
      100% { opacity: 0; }
    }

    .hero-carousel__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.59) 0%, rgba(255, 255, 255, 0.61) 100%);
      z-index: 1;
    }

    .hero__content {
      position: relative;
      z-index: 2;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--dourado), transparent);
      opacity: 0.5;
      z-index: 2;
    }

    .hero-logo {
      width: min(320px, 65vw);
      max-width: 380px;
      height: auto;
      margin-bottom: 1.5rem;
    }

    .hero-logo img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.25rem, 4vw, 1.5rem);
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--branco);
      margin-bottom: 0.25rem;
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 3.5vw, 1.25rem);
      font-style: italic;
      color: var(--dourado-escuro);
      letter-spacing: 0.2em;
      margin-bottom: 2.75rem;
      text-transform: lowercase;
    }

    .cta-buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 1rem 2rem;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      border: 2px solid var(--dourado);
      border-radius: 0;
      cursor: pointer;
      transition: all 0.3s ease;
      min-height: 52px;
      min-width: 300px;
      width: 100%;
    }

    .btn-primary {
      background: var(--dourado);
      color: var(--preto);
      border-color: var(--dourado);
    }

    .btn-primary:hover,
    .btn-primary:focus {
      background: var(--dourado-claro);
      border-color: var(--dourado-claro);
      color: var(--preto);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(201, 169, 98, 0.35);
    }

    .btn-secondary {
      background: transparent;
      color: var(--dourado-escuro);
    }

    .btn-secondary:hover,
    .btn-secondary:focus {
      background: var(--dourado);
      color: var(--preto);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(201, 169, 98, 0.25);
    }

    .btn-outline {
      background: transparent;
      color: var(--preto);
      border-color: rgba(26, 26, 26, 0.5);
    }

    .btn-outline:hover,
    .btn-outline:focus {
      border-color: var(--dourado-escuro);
      color: var(--dourado-escuro);
      transform: translateY(-2px);
    }

    .btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: var(--dourado);
      margin: 2rem auto;
      opacity: 0.7;
    }

    /* Galeria / Inspirações */
    .galeria {
      padding: 3rem 1.5rem 4rem;
      background: #ffffff;
    }

    .galeria-titulo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--preto);
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .galeria-subtitulo {
      font-size: 0.9rem;
      color: var(--dourado-escuro);
      letter-spacing: 0.1em;
      text-align: center;
      margin-bottom: 2rem;
    }

    .galeria-subtitulo a {
      color: var(--dourado);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s, color 0.3s;
    }

    .galeria-subtitulo a:hover {
      color: var(--dourado-claro);
      border-bottom-color: var(--dourado-claro);
    }

    .galeria-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
      max-width: 900px;
      margin: 0 auto 2rem;
    }

    .galeria-item {
      aspect-ratio: 1;
      overflow: hidden;
      position: relative;
      background: rgba(201, 169, 98, 0.1);
    }

    .galeria-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }

    .galeria-item:hover img {
      transform: scale(1.08);
    }

    .galeria-cta {
      text-align: center;
    }

    .galeria-cta .btn {
      min-width: 300px;
      max-width: 380px;
      width: 100%;
    }

    @media (min-width: 600px) {
      .galeria-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 0.75rem;
      }
    }

    @media (min-width: 900px) {
      .galeria-grid {
        gap: 1rem;
      }
    }

    /* Onde me encontrar */
    .onde-encontrar {
      padding: 3rem 1.5rem 4rem;
      background: #ffffff;
    }

    .onde-encontrar__titulo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--preto);
      text-align: center;
      margin-bottom: 2rem;
    }

    .onde-encontrar__conteudo {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      max-width: 1000px;
      margin: 0 auto;
    }

    .onde-encontrar__mapa {
      flex: 1;
      min-height: 280px;
      border: 1px solid rgba(201, 169, 98, 0.3);
      overflow: hidden;
    }

    .onde-encontrar__mapa iframe {
      width: 100%;
      height: 100%;
      min-height: 280px;
      display: block;
      border: 0;
    }

    .onde-encontrar__endereco {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: left;
    }

    .onde-encontrar__endereco p {
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--preto);
      letter-spacing: 0.02em;
    }

    .onde-encontrar__endereco strong {
      color: var(--dourado-escuro);
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
      display: block;
    }

    @media (min-width: 768px) {
      .onde-encontrar__conteudo {
        flex-direction: row;
        align-items: stretch;
        gap: 2.5rem;
      }

      .onde-encontrar__mapa {
        min-height: 320px;
        min-width: 0;
      }

      .onde-encontrar__mapa iframe {
        min-height: 320px;
      }
    }

    .footer {
      padding: 2rem 1.5rem;
      text-align: center;
      font-size: 0.8rem;
      color: rgba(26, 26, 26, 0.65);
      letter-spacing: 0.05em;
    }

    @media (min-width: 480px) {
      .cta-buttons {
        max-width: 460px;
      }

      .btn {
        padding: 1.1rem 2.25rem;
        font-size: 1rem;
        min-width: 320px;
      }
    }

    @media (min-width: 768px) {
      .hero {
        padding: 3rem 2rem 4rem;
      }

      .logo {
        letter-spacing: 0.2em;
      }

      .cta-buttons {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 820px;
        gap: 1.25rem;
      }

      .btn {
        flex: 1;
        min-width: 250px;
        width: auto;
      }
    }
  </style>
</head>
